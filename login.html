<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StillSpace | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="login">
  <div class="floating-shapes" aria-hidden="true">
    <span class="shape shape-1"></span>
    <span class="shape shape-2"></span>
    <span class="shape shape-3"></span>
  </div>

  <main class="auth-page page">
    <a class="brand floating-brand" href="index.html">StillSpace</a>
    <button id="themeToggle" class="icon-btn floating-toggle" type="button" aria-label="Toggle dark mode">Dark</button>

    <section class="auth-card glass">
      <h1>Welcome back</h1>
      <p>Take a gentle pause, then continue your reflection journey.</p>

      <form id="loginForm" class="form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="********" required />

        <button type="submit" class="btn btn-primary full">Login</button>
      </form>

      <p id="loginMessage" class="status-text" role="status"></p>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
